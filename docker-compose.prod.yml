# 배포용 구성. 이 파일 하나로 완결된다.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# 개발용은 docker-compose.yml 이고 서로 겹쳐 쓰지 않는다.
# 비밀번호·토큰·소셜 로그인 주소는 전부 .env 에서 읽는다. 값이 없으면 기동에 실패한다.
#
# 개발용과 다른 점
#   - 비밀번호와 토큰이 파일에 박혀 있지 않다
#   - HIBERNATE_DDL_AUTO 가 validate 다 (재시작해도 테이블이 지워지지 않는다)
#   - 로그인 쿠키가 HTTPS 로만 오간다
#   - 로그가 INFO 다
#   - 바깥에 열리는 포트는 화면(80) 하나뿐이다. DB·Redis·RabbitMQ 는 컨테이너끼리만 통한다
#   - 화면이 Vite 개발 서버가 아니라 미리 빌드한 파일을 nginx 가 서빙한다
#   - prometheus·grafana 는 서버 안(127.0.0.1)에만 열린다. SSH 로 연결해서 본다
name: trypto

networks:
  trypto-net:
    name: trypto-net

services:
  # ---------- infra ----------
  mysql:
    image: mysql:8.0.30
    restart: unless-stopped
    networks:
      - trypto-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD 를 .env 에 넣어야 한다}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trypto}
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - trypto-net
    command:
      - redis-server
      - --port
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    networks:
      - trypto-net
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-trypto}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD 를 .env 에 넣어야 한다}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7.10-alpine
    restart: unless-stopped
    networks:
      - trypto-net
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./docker/influxdb/init-tasks.sh:/docker-entrypoint-initdb.d/init-tasks.sh
    environment:
      # setup 항목들은 볼륨이 비어 있는 최초 1회에만 적용된다.
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:?INFLUXDB_PASSWORD 를 .env 에 넣어야 한다}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-trypto}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-ticker}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:?INFLUXDB_TOKEN 를 .env 에 넣어야 한다}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- app ----------
  collector:
    build: ./collector
    image: ${COLLECTOR_IMAGE:-kimsehee98/trypto-collector:v1}
    restart: unless-stopped
    networks:
      - trypto-net
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-trypto}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      DB_HOST: mysql
      DB_USERNAME: ${MYSQL_USERNAME:-root}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      MANAGEMENT_PORT: "9090"
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  backend:
    build: ./api
    image: ${API_IMAGE:-kimsehee98/trypto-api:v1}
    restart: unless-stopped
    networks:
      - trypto-net
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trypto}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-trypto}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      # 테이블에 손대지 않는다.
      # 테이블이 하나도 없는 최초 배포에서만 .env 에서 create 로 바꿔 한 번 띄우고, 곧바로 되돌린다.
      HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-none}
      SQL_INIT_MODE: ${SQL_INIT_MODE:-always}
      # 로그인 쿠키를 HTTPS 로만 보낸다.
      SESSION_COOKIE_SECURE: "true"
      COMPENSATION_BOUNDARY_SECONDS: "30"
      COMPENSATION_INTERVAL_MS: "30000"
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID 를 .env 에 넣어야 한다}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET 를 .env 에 넣어야 한다}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:?KAKAO_REDIRECT_URI 를 .env 에 넣어야 한다}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID 를 .env 에 넣어야 한다}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET 를 .env 에 넣어야 한다}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:?GOOGLE_REDIRECT_URI 를 .env 에 넣어야 한다}
      # 안드로이드·아이폰 앱(clientType=ANDROID | IOS)이 쓰는 자격증명. 아직 앱이 없으므로 전부 선택값으로 둔다.
      # 비워 두면 해당 유형의 로그인만 SOCIAL_LOGIN_NOT_CONFIGURED 로 응답하고 웹 로그인은 그대로 동작한다.
      # 구글은 Android 와 iOS 에 서로 다른 client_id 를 발급하므로 둘을 한 묶음으로 공유하지 않는다.
      # 시크릿은 구글 Android/iOS 클라이언트에 발급되지 않으므로 빈 값이면 토큰 교환 폼에서 빠진다.
      KAKAO_ANDROID_CLIENT_ID: ${KAKAO_ANDROID_CLIENT_ID:-}
      KAKAO_ANDROID_CLIENT_SECRET: ${KAKAO_ANDROID_CLIENT_SECRET:-}
      KAKAO_ANDROID_REDIRECT_URI: ${KAKAO_ANDROID_REDIRECT_URI:-}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID:-}
      GOOGLE_ANDROID_CLIENT_SECRET: ${GOOGLE_ANDROID_CLIENT_SECRET:-}
      GOOGLE_ANDROID_REDIRECT_URI: ${GOOGLE_ANDROID_REDIRECT_URI:-}
      KAKAO_IOS_CLIENT_ID: ${KAKAO_IOS_CLIENT_ID:-}
      KAKAO_IOS_CLIENT_SECRET: ${KAKAO_IOS_CLIENT_SECRET:-}
      KAKAO_IOS_REDIRECT_URI: ${KAKAO_IOS_REDIRECT_URI:-}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID:-}
      GOOGLE_IOS_CLIENT_SECRET: ${GOOGLE_IOS_CLIENT_SECRET:-}
      GOOGLE_IOS_REDIRECT_URI: ${GOOGLE_IOS_REDIRECT_URI:-}
      LOG_LEVEL_WEBSOCKET: ${LOG_LEVEL_WEBSOCKET:-INFO}
    depends_on:
      collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 240s

  engine:
    build: ./engine
    image: ${ENGINE_IMAGE:-kimsehee98/trypto-engine:v1}
    restart: unless-stopped
    networks:
      - trypto-net
    volumes:
      - engine-wal:/wal
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trypto}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-trypto}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      ENGINE_WAL_DIR: /wal
      MANAGEMENT_PORT: "8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      # VITE_ 값은 빌드 시점에 파일 안에 박힌다. 값을 바꾸면 반드시 --build 로 다시 굽는다.
      args:
        VITE_KAKAO_CLIENT_ID: ${VITE_KAKAO_CLIENT_ID:?VITE_KAKAO_CLIENT_ID 를 .env 에 넣어야 한다}
        VITE_KAKAO_REDIRECT_URI: ${VITE_KAKAO_REDIRECT_URI:?VITE_KAKAO_REDIRECT_URI 를 .env 에 넣어야 한다}
        VITE_KAKAO_AUTH_URL: ${VITE_KAKAO_AUTH_URL:-https://kauth.kakao.com/oauth/authorize}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:?VITE_GOOGLE_CLIENT_ID 를 .env 에 넣어야 한다}
        VITE_GOOGLE_REDIRECT_URI: ${VITE_GOOGLE_REDIRECT_URI:?VITE_GOOGLE_REDIRECT_URI 를 .env 에 넣어야 한다}
        VITE_GOOGLE_AUTH_URL: ${VITE_GOOGLE_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
    image: ${FRONTEND_IMAGE:-kimsehee98/trypto-frontend:v1}
    restart: unless-stopped
    networks:
      - trypto-net
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    # nginx 는 IPv4 에만 붙는다. 컨테이너 안에서 localhost 는 ::1 로 먼저 풀리므로 127.0.0.1 로 확인한다.
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------- monitoring ----------
  # 3000·9091 포트는 127.0.0.1 에만 연다. 서버 바깥에서는 접속할 수 없고,
  # 볼 때는 SSH 로 연결해서 본다.
  #
  #   ssh -L 3000:localhost:3000 <계정>@<서버주소>
  #
  # 그리고 내 컴퓨터 브라우저에서 http://localhost:3000 을 연다.
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    networks:
      - trypto-net
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --enable-feature=native-histograms

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    networks:
      - trypto-net
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # 이 값이 없으면 admin / admin 으로 뜬다. 반드시 .env 에서 준다.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD 를 .env 에 넣어야 한다}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  influxdb-data:
  engine-wal:
  prometheus-data:
  grafana-data:
