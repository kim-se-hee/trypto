global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'collector'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['collector:9090']

  - job_name: 'api'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']

  - job_name: 'engine'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['engine:8082']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
