spring:
  application:
    name: api
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:trypto}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:create}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      schema-locations: classpath:/db/schema.sql
      data-locations: ${SQL_INIT_DATA_LOCATIONS:classpath:/db/no-op.sql}
      continue-on-error: false

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:trypto-collector-token}
  org: ${INFLUXDB_ORG:trypto}
  bucket: ${INFLUXDB_BUCKET:ticker}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  level:
    org.springframework.web.socket: ${LOG_LEVEL_WEBSOCKET:DEBUG}
    org.springframework.messaging.simp.stomp: ${LOG_LEVEL_WEBSOCKET:DEBUG}
    org.apache.tomcat.websocket: ${LOG_LEVEL_WEBSOCKET:DEBUG}

app:
  websocket:
    endpoint: /ws
    heartbeat-send: 10000
    heartbeat-receive: 10000
  market-meta-sync:
    max-retries: 30
    retry-interval-seconds: 5
  auth:
    session:
      secure: ${SESSION_COOKIE_SECURE:false}
      ttl: ${SESSION_TTL:7d}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:}
      token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
      connect-timeout: ${KAKAO_CONNECT_TIMEOUT:3s}
      read-timeout: ${KAKAO_READ_TIMEOUT:5s}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}
      token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
      user-info-uri: ${GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
      connect-timeout: ${GOOGLE_CONNECT_TIMEOUT:3s}
      read-timeout: ${GOOGLE_READ_TIMEOUT:5s}
  exchanges:
    - name: UPBIT
      market-type: DOMESTIC
      base-currency-symbol: KRW
      fee-rate: 0.0005
    - name: BITHUMB
      market-type: DOMESTIC
      base-currency-symbol: KRW
      fee-rate: 0.0025
    - name: BINANCE
      market-type: OVERSEAS
      base-currency-symbol: USDT
      fee-rate: 0.001
