name: trypto
description: Trypto 코인 모의투자 모바일 앱
publish_to: none
version: 1.0.0+1

environment:
  # json_serializable 이 includeIfNull: false 필드에 null-aware element(`?instance.x`) 를
  # 생성한다. 이 문법은 Dart 3.8 부터라 하한을 3.6 에 두면 생성 코드가 파싱되지 않는다.
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리 + DI
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.6.2

  # 네트워크
  dio: ^5.7.0

  # 실시간
  stomp_dart_client: ^2.1.0
  connectivity_plus: ^6.1.0

  # 인증
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6
  # 카카오는 브라우저 리다이렉트가 불가(커스텀 스킴을 REST 리다이렉트로 등록 불가)해 공식 SDK 로
  # 앱에서 액세스 토큰을 받고, 백엔드가 그 토큰으로 신원을 확인한다. 구글은 flutter_web_auth_2 유지.
  kakao_flutter_sdk_user: ^1.9.0

  # 값·포맷
  decimal: ^3.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # 직렬화
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^1.0.0
  lucide_icons_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  http_mock_adapter: ^0.6.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # 폰트 파일은 assets/fonts/README.md 의 출처에서 받아 번들한다(OFL/Apache 라이선스).
  # Pretendard 는 본문·UI, NotoSansKR ExtraBold 는 큰 강조 숫자, RobotoMono 는 시세 숫자에 쓴다.
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-ExtraBold.otf
          weight: 800
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
