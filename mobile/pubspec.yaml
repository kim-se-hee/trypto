name: trypto
description: Trypto 코인 모의투자 모바일 앱
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리 + DI
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.6.2

  # 네트워크
  dio: ^5.7.0

  # 실시간
  stomp_dart_client: ^2.1.0
  connectivity_plus: ^6.1.0

  # 인증
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6

  # 값·포맷
  decimal: ^3.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # 직렬화
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^1.0.0
  lucide_icons_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  http_mock_adapter: ^0.6.1
  flutter_lints: ^5.0.0

# 폰트(Pretendard / NotoSansKR / RobotoMono) 번들은 에셋이 들어오는 2단계에서 선언한다.
flutter:
  uses-material-design: true
