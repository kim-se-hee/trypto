name: trypto
description: Trypto 코인 모의투자 모바일 앱
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리 + DI
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.6.2

  # 네트워크
  dio: ^5.7.0

  # 실시간
  stomp_dart_client: ^2.1.0
  connectivity_plus: ^6.1.0

  # 인증
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6

  # 값·포맷
  decimal: ^3.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # 직렬화
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^1.0.0
  lucide_icons_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  http_mock_adapter: ^0.6.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # 폰트 파일은 아직 저장소에 없다(라이선스·용량). assets/fonts/README.md 의 목록대로 파일을
  # 넣은 뒤 아래 선언의 주석을 해제한다. 선언만 남기고 파일이 없으면 빌드가 실패하므로
  # 지금은 주석으로 둔다. 그동안 theme.dart 의 패밀리는 시스템 폰트로 폴백된다.
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/Pretendard-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/Pretendard-SemiBold.otf
  #         weight: 600
  #       - asset: assets/fonts/Pretendard-Bold.otf
  #         weight: 700
  #   - family: NotoSansKR
  #     fonts:
  #       - asset: assets/fonts/NotoSansKR-ExtraBold.otf
  #         weight: 800
  #   - family: RobotoMono
  #     fonts:
  #       - asset: assets/fonts/RobotoMono-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/RobotoMono-Bold.ttf
  #         weight: 700
